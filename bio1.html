<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* VARIÁVEIS: Centralização de cores para facilitar mudanças */
        :root {
            --edu-dark: #1b4332;      /* Verde escuro */
            --edu-light: #f8fdfa;     /* Branco verde */
            --edu-accent: #52b788;    /* Verde destaque */
            --x-red: #ff5e5e;         /* Vermelho suave dos botões X */
        }

        /* BACKGROUND animadao*/
        body {
            background: linear-gradient(135deg, #d8f3dc 0%, #f8fdfa 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Animação de flutuação (aquela suave) */
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(5deg); opacity: 0.6; }
            100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
        }

        /* ELEMENTOS do background */
        .bg-shape {
            position: absolute;
            background: var(--edu-accent);
            filter: blur(40px);
            border-radius: 50%;
            z-index: -1;
            animation: float 8s ease-in-out infinite;
        }

        /* PRINCIPAL: Estilo "Glassmorphism" xique */
        .edu-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(27, 67, 50, 0.1);
        }

        /* INPUTS*/
        .input-group-field {
            border: 2px solid transparent;
            background: #ffffff;
            border-radius: 12px;
            padding: 12px 18px;
            transition: 0.3s;
            color: var(--edu-dark);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .input-group-field:focus {
            border-color: var(--edu-accent);
            outline: none;
            box-shadow: 0 5px 15px rgba(82, 183, 136, 0.2);
        }

        /* BOTÕES X */
        .btn-x {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            border: none;
            background: #ffebeb;
            color: var(--x-red);
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-x:hover {
            background: var(--x-red);
            color: white;
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 5px 15px rgba(255, 94, 94, 0.3);
        }

        /* BARRA DE TÓPICO */
        .topic-badge {
            background: var(--edu-accent);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="bg-shape" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
    <div class="bg-shape" style="width: 200px; height: 200px; bottom: -50px; right: -50px; animation-delay: 2s;"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                
                <div class="edu-card p-4 p-md-5">
                    
                    <header class="text-center mb-4">
                        <h1 class="fw-bold mb-0" style="color: var(--edu-dark);">LUPA</h1>
                        <span class="topic-badge">Sistema Acadêmico</span>
                        <p class="text-muted small mt-3">Organize seus tópicos de estudo abaixo</p>
                    </header>

                    <div class="p-3 mb-4 text-center rounded-3" style="background: #effaf3; border: 1px dashed var(--edu-accent);">
                        <small class="text-success fw-bold">Dica: Preencha cada campo por prioridade.</small>
                    </div>

                    <div id="inputList" class="d-flex flex-column gap-3 mb-5">
                        </div>

                    <footer class="d-flex justify-content-center gap-3 pt-4 border-top">
                        <button class="btn-x" title="Remover">✕</button>
                        <button class="btn-x" title="Remover">✕</button>
                        <button class="btn-x" title="Remover">✕</button>
                        <button class="btn-x" title="Remover">✕</button>
                        <button class="btn-x" title="Remover">✕</button>
                    </footer>

                </div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const list = document.getElementById('inputList');
            const placeholderTexto = ["Pedro arabe", "fabricio mohamed", "luiz inacio", "joao poucas idea", "samuel vida loka"];

            // Dinâmica para tirar a sujeira
            placeholderTexto.forEach((txt, i) => {
                const input = document.createElement('input');
                input.type = "text";
                input.placeholder = txt;
                input.className = "input-group-field";
                
                // Animação de entrada suave usando delay
                input.style.opacity = "0";
                input.style.transform = "translateY(10px)";
                input.style.transition = `all 0.5s ease ${i * 0.1}s`;

                list.appendChild(input);

                // Ativa a animação após o render
                setTimeout(() => {
                    input.style.opacity = "1";
                    input.style.transform = "translateY(0)";
                }, 50);
            });
        });
    //pensando parte 2
    </script>
</body>
</html>
