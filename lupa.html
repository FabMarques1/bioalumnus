<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPA - BioAlumnus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="frontend/styles/game.css">
    <link rel="icon" href="frontend/assets/icons/icon.png">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <span class="logo-text">LUPA</span>
                </div>
                <div class="header-info">
                    <div class="header-level">Nível de ensino</div>
                    <div class="header-topic">Tema escolhido.</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Dicas -->
            <div class="hint-card">
                <div class="hint-label">Tabela de dicas</div>
                <p class="hint-text">
                    Aqui se posicionarão as respectivas dicas do jogo em relação ao Lupa e os materiais desenvolvidos
                </p>
            </div>

            <!-- Game Card -->
            <div class="game-card">
                <div class="input-row">
                    <input type="text" class="game-input" id="input-1" placeholder="" data-index="0">
                </div>

                <div class="input-row">
                    <input type="text" class="game-input" id="input-2" placeholder="" data-index="1" disabled>
                </div>

                <div class="input-row">
                    <input type="text" class="game-input" id="input-3" placeholder="" data-index="2" disabled>
                </div>
                
                <div class="input-row">
                    <input type="text" class="game-input" id="input-4" placeholder="" data-index="3" disabled>
                </div>

                <div class="input-row">
                    <input type="text" class="game-input" id="input-5" placeholder="" data-index="4" disabled>
                </div>

                <!-- Result Blocks -->
                <div class="result-blocks">
                    <div class="result-block" id="block-0"></div>
                    <div class="result-block" id="block-1"></div>
                    <div class="result-block" id="block-2"></div>
                    <div class="result-block" id="block-3"></div>
                    <div class="result-block" id="block-4"></div>
                </div>

                <button type="button" class="btn-submit" id="btn-verificar">Verificar Resposta</button>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('.game-input');
            
            // Habilita o próximo input quando o atual é preenchido
            inputs.forEach((input, index) => {
                input.addEventListener('input', function() {
                    if (this.value.trim() !== '' && index < inputs.length - 1) {
                        inputs[index + 1].disabled = false;
                    }
                });

                // Quando o campo perde o foco e está vazio, desabilita os próximos
                input.addEventListener('blur', function() {
                    if (this.value.trim() === '') {
                        for (let i = index + 1; i < inputs.length; i++) {
                            inputs[i].disabled = true;
                            inputs[i].value = '';
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
